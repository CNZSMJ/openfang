api_listen = "127.0.0.1:4200"

[approval]
require_approval = []

[channels.telegram]
bot_token_env = "TELEGRAM_BOT_TOKEN"
default_agent = "assistant"

[default_model]
api_key_env = "MINIMAX_API_KEY"
model = "MiniMax-M2.5"
provider = "minimax"

[memory]
decay_rate = 0.05

# --- MCP Servers (MiniMax Coding Plan) ---
[[mcp_servers]]
name = "MiniMax"
timeout_secs = 60
env = ["MINIMAX_API_KEY", "MINIMAX_API_HOST"]

[mcp_servers.transport]
type = "stdio"
command = "uvx"
args = ["minimax-coding-plan-mcp", "-y"]
