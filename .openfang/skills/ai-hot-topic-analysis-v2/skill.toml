prompt_context = """
## 技能说明
这是一个分析AI热点赛道的完整方法论，用于从产业逻辑推导出最佳交易方向和标的。新增了\"新技术发现与学习\"流程，避免路径依赖，确保分析全面。

## 核心原则
1. **用事实数据论证，禁止瞎说**：每个结论必须有数据支撑
2. **数据必须是最新的**：优先使用当日或近日的一手数据
3. **逻辑链完整**：产业链传导 → 交易方向 → 标的选择，每环必须有因果
4. **保持好奇，拥抱新事物**：搜索中发现的新技术/新概念要深入学习理解

---

## 分析框架

### 第零步：新技术发现与学习（新增！）

**为什么重要**：分析前容易有\"选择偏见\"，只搜已知方向会漏掉新技术

**搜索策略**：

```
Step 1: 广泛搜索主干话题
搜索词：\"AI [行业] 散热 技术\" 或 \"[热点] 产业链\"
目的：让搜索结果自然带出各种技术路线

Step 2: 敏锐捕捉新概念
从搜索结果中发现：
- 不熟悉的技术名词（如：金刚石散热、Diamond Cooling、相变散热）
- 新出现的公司（如：Akash Systems）
- 新兴的材料或工艺

Step 3: 精细化深入搜索
对每个新发现的概念单独搜索：
\"金刚石散热 商用 2025\" 
\"相变散热 数据中心\"
\"[新公司名] 产业链\"

Step 4: 理解新技术的上下游
新技术 → 核心材料/部件 → 供应商 → 受益标的
```

**关键心态**：
- 不要看到不懂的名词就跳过，要追根问底
- 搜索结果里滑走的\"奇怪名词\"可能藏着新赛道
- 问自己：\"除了我已知的，还有别的散热方式吗？\"

---

### 第一步：产业链传导分析

**分析逻辑**：热点事件 → 底层需求变化 → 产业链传导

**标准问题链**：
1. 热点（OpenClaw/AI应用）最底层拉动的需求是什么？（Token消耗/算力）
2. 算力需求增长最直接传导到哪个环节？（光模块/服务器/芯片）
3. 该环节的业绩兑现时间点是什么？（已兑现/3个月/6个月/1年）

**数据来源**：
- 公司业绩预告/财报（巨潮、交易所）
- 机构调研纪要（DoNews、财联社）
- 券商研报（华西、国盛、中信建投等）
- 资金流向（同花顺、东方财富）
- **搜索中发现的新技术/新概念**（通过Step 0捕获）

---

### 第二步：最佳交易方向推导

**三维验证模型**：

| 维度 | 分析内容 | 信号 |
|------|----------|------|
| **资金行为** | 主力资金净流入/流出 | 持续流出=凉，持续流入=热 |
| **产业逻辑** | 业绩是否已兑现 | 已兑现=真利好，未兑现=画饼 |
| **估值泡沫** | 短期涨幅是否过大 | 涨幅>50%且无业绩=风险 |

**分化判断**：
- 硬件（光模块、服务器）：业绩确定性最强，继续涨
- 软件/应用：业绩未兑现，回调
- **新技术路线**：刚商用=从0到1，业绩未兑现但想象空间大

---

### 第三步：最佳标的选择

**选择标准**：

1. **业绩验证**：优先选择2025年财报已经兑现的公司
2. **订单确认**：2026年Q1/Q2订单已确认增长
3. **市场份额**：细分领域排名前三
4. **机构共识**：多家机构给出买入/增持评级

**排序优先级**：
```
业绩已兑现 + 订单增长 > 业绩未兑现 + 概念炒作
```

**注意**：新技术路线（刚商用）的标的，业绩未兑现是正常的，重点看：
- 技术是否领先
- 是否进入巨头供应链
- 产能规划

---

### 第四步：数据追溯清单

分析完成后，必须列出：

| 数据项 | 具体数值 | 来源 | 时间 |
|--------|----------|------|------|
| [具体数据] | [具体数值] | [具体媒体/公告] | [具体日期] |

---

## 输出格式示例

```
## XX热点产业链传导分析

### 零、新技术发现（本次新增）
[记录搜索中发现的新技术/新概念，及深入分析]

### 一、产业链传导链
[用数据说明传导路径]

### 二、最佳交易方向
[三维验证结论]

### 三、最佳标的选择
[具体标的及逻辑]

### 四、数据来源清单
[完整的数据追溯表]
```

---

## 案例复盘：金刚石散热遗漏事件

**问题**：首次搜索只用了\"液冷数据中心 散热\"，漏掉了金刚石散热路线

**改进后搜索流程**：

```
Step 1: 搜\"AI 数据中心 散热 技术\"
结果：液冷、间接蒸发冷却、金刚石散热、相变散热...

Step 2: 发现\"金刚石散热\"这个陌生名词
→ 单独搜索\"金刚石散热 商用 AMD\"
→ 发现 Akash Systems、Diamond Cooling

Step 3: 顺着产业链深挖
Akash Systems → 供应商是培育钻石企业 → 黄河旋风、四方达

Step 4: 理解技术原理
金刚石导热系数是铜5倍 → 用于高功率AI芯片 → 2026年刚商用
```

---

## 注意事项
- 禁止使用\"预计\"、\"大概\"、\"可能\"等模糊词汇描述已发生的事实
- 推测性结论必须标注为\"机构预测\"或\"市场预期\"
- 数据必须可验证，用关键词可搜索到原始出处
- **新技术发现是分析的前置步骤，不要跳过！**"""

