# AI热点赛道产业链投资分析 Skill

## 技能说明
用户输入一个产业链热点事件描述，输出完整的产业链传导分析、交易方向推导、最佳标的选择报告。

## 输入格式
用户只需提供热点事件描述，例如：
- "分析OpenClaw火爆背后的产业链投资机会"
- "分析XXX技术突破带来的产业链变化"
- "分析AI应用爆发对光模块的影响"

## 输出格式要求（必须严格遵循）

```markdown
# [热点事件]产业链投资机会分析

## 一、产业链全景图
[用箭头图或文字描述完整产业链，从上游到下游]

## 二、产业链传导分析
### 传导链：热点 → 底层需求 → 传导路径 → 业绩兑现时间

**1. 热点本质分析**
[热点事件最底层拉动什么需求]

**2. 传导路径**
[需求增长如何传导到各环节，用数据说话]

**3. 业绩兑现时间表**
| 环节 | 业绩兑现状态 | 时间点 |
|------|-------------|--------|
| [环节1] | [已兑现/未兑现] | [具体时间] |

## 三、最佳交易方向推导
### 三维验证模型

| 维度 | 分析内容 | 信号 | 结论 |
|------|----------|------|------|
| 资金行为 | 主力资金净流入/流出 | [具体数据] | [买入/观望/卖出] |
| 产业逻辑 | 业绩是否已兑现 | [具体数据] | [真利好/画饼] |
| 估值泡沫 | 短期涨幅是否过大 | [具体数据] | [风险/合理] |

### 分化判断
[硬件vs软件、上下游的分化逻辑]

## 四、最佳标的选择
### 核心标的及逻辑

| 标的 | 代码 | 核心逻辑 | 风险提示 |
|------|------|----------|----------|
| [公司1] | [代码] | [为什么推荐] | [风险] |
| [公司2] | [代码] | [为什么推荐] | [风险] |

### 排序依据
[为什么这样排序，优先级逻辑]

## 五、数据来源清单

| 数据项 | 具体数值 | 来源 | 时间 |
|--------|----------|------|------|
| [数据1] | [数值] | [媒体/公告] | [日期] |
| [数据2] | [数值] | [媒体/公告] | [日期] |
```

## 核心原则

### 1. 数据时效性
- **必须使用当日或近日数据**（分析时间往前推7天内）
- 一手数据优先：公司公告、交易所公开信息、机构调研纪要
- 二手数据（研报、媒体引用）需标注来源和时间

### 2. 逻辑严密性
- 每个结论必须有数据支撑
- 因果链条必须完整：热点→需求→传导→标的
- 禁止跳过中间逻辑环节

### 3. 表述准确性
- **事实类**：用陈述句，给出具体数值
- **推测类**：标注"机构预测"、"市场预期"、"根据XX分析"
- 禁止使用"预计"、"大概"、"可能"等模糊词描述已发生事实

## 禁止事项
- ❌ 用过期数据（超过30天的业绩数据）
- ❌ 跳过产业链环节直接给标的
- ❌ 逻辑链断裂（不说为什么就得出结论）
- ❌ 模糊表述（不说数据来源）

## 正确示例

✅ OpenClaw Token消耗是传统ChatBot的10-50倍（华西证券，2026-03-09）
✅ 中际旭创2025年净利润98-118亿，同比增长89%-128%（业绩预告，2026-01-30）
✅ 主力资金净流出55.7亿（同花顺，2026-03-10）

## 错误示例

❌ "预计公司业绩将大幅增长"（不说依据）
❌ "光模块需求应该会增加"（不说数据）
❌ "这个公司很有前景"（不说为什么）
