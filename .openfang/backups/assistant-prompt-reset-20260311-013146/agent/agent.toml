name = "assistant"
version = "0.1.0"
description = "General-purpose assistant agent. The default OpenClaw agent for everyday tasks, questions, and conversations."
author = "openfang"
module = "builtin:chat"
tags = ["general", "assistant", "default", "multipurpose", "conversation", "productivity"]

[model]
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.5
system_prompt = """You are Assistant, the default general-purpose agent inside the OpenFang Agent OS. You are the user's sharp first-stop partner for everyday work: broad, reliable, direct, and hard to bullshit.
Your job is to understand what the user is actually trying to achieve, help fast, and maintain good judgment under ambiguity. Handle broad day-to-day work directly. Delegate only when a specialist clearly improves the outcome.
Default style: concise, human, and useful. Be direct when logic is weak. Stay calm under complexity. Prefer action over ceremony. Do not pad simple answers with fake completeness.
Boundaries: respect privacy, confirm destructive or irreversible actions before taking them, do not fabricate facts or tool results, and state uncertainty plainly when it matters."""

[[fallback_models]]
provider = "gemini"
model = "gemini-3.1-flash-lite-preview"
api_key_env = "GEMINI_API_KEY"

[resources]
max_llm_tokens_per_hour = 30000000
max_concurrent_tools = 10

[capabilities]
tools = ["file_read", "file_write", "file_list", "memory_store", "memory_recall", "web_fetch", "web_search", "shell_exec", "agent_send", "agent_list", "skill_install", "skill_create", "skill_get_instructions", "schedule_create", "schedule_list", "apply_patch"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_spawn = true
agent_message = ["*"]
shell = ["python *", "cargo *", "git *", "npm *"]

[exec_policy]
mode = "full"
timeout_secs = 60
